# Supply Chain Compliance Audit - Configuration File
# Version 1.0

# =============================================================================
# AGE THRESHOLD
# =============================================================================
# Packages installed within this many days are subject to scrutiny.
# Default: 7 days
AGE_THRESHOLD_DAYS=7

# =============================================================================
# OUTPUT DIRECTORIES
# =============================================================================
# Directory where report files will be saved.
# Default: ./reports (relative to script location)
# REPORTS_DIR=./reports

# =============================================================================
# TRUSTED REPOSITORIES
# =============================================================================
# Only packages from these domains are considered trusted.
# Packages from other sources will be flagged.
# Add only official distro repositories here.
TRUSTED_DOMAINS=(
    "deb.debian.org"
    "security.debian.org"
    "archive.debian.org"
    "ftp.debian.org"
    "http.debian.org"
    "ports.ubuntu.com"
    "security.ubuntu.com"
    "archive.ubuntu.com"
)

# =============================================================================
# EXEMPT PATTERNS
# =============================================================================
# Package name patterns that are automatically exempt from scrutiny.
# These packages will not be flagged regardless of age or source.
# Uses shell glob patterns (wildcards: *, ?, [...])
EXEMPT_PATTERNS=(
    # Linux kernel packages
    "linux-image-*"
    "linux-headers-*"
    "linux-modules-*"
    "linux-modules-extra-*"
    "linux-signed-image-*"
    "linux-kbuild-*"
    "linux-cloud-tools-*"
    "linux-tools-*"
    "linux-generic-*"
    "linux-signed-generic-*"
    "linux-hwe-*"
    
    # Security and critical updates
    "*-security"
    "*-backports"
    
    # Essential system packages (high-trust)
    "gcc-*"
    "libc6*"
    "libgcc*"
    "base-files"
    "dpkg"
    "apt"
    "bash"
    "coreutils"
    "systemd*"
    "openssl*"
    "ca-certificates*"
    "gnupg*"
    "apt-transport-https"
    
    # Debian/Ubuntu base packages
    "debianutils"
    "diffutils"
    "findutils"
    "gawk"
    "grep"
    "gzip"
    "hostname"
    "ncurses-*"
    "perl*"
    "sed"
    "tar"
    "util-linux"
)

# =============================================================================
# NOTIFICATION SETTINGS
# =============================================================================
# Enable email notifications on audit completion (requires mailutils/postfix)
# NOTIFY_EMAIL=admin@example.com
# NOTIFY_ON_FLAG=1

# =============================================================================
# LOGGING SETTINGS
# =============================================================================
# Log level: DEBUG, INFO, WARN, ERROR
# LOG_LEVEL=INFO

# =============================================================================
# INTEGRITY CHECKS
# =============================================================================
# Enable detailed integrity verification
# VERIFY_CHECKSUMS=1
# VERIFY_SIGNATURES=1
